<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA RP ORG — Créer un compte</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
  <a href="index.html" class="brand"><span class="brand-mark">G</span> GTA RP ORG</a>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="index.html#apropos">À propos</a></li>
      <li><a href="index.html#fonctionnalites">Fonctionnalités</a></li>
      <li><a href="login.html">Connexion</a></li>
    </ul>
  </nav>
  <div class="nav-actions">
    <a href="login.html" class="btn btn-secondary">Connexion</a>
  </div>
</header>

<main class="auth-page">
  <form class="auth-card" id="registerForm">
    <h2>Créer un compte</h2>
    <p class="auth-sub">Rejoins la communauté GTA RP</p>

    <div class="field">
      <label for="username">Nom d'utilisateur</label>
      <input id="username" name="username" type="text" placeholder="Choisis ton nom" autocomplete="username" required>
    </div>

    <div class="field">
      <label for="pin">PIN</label>
      <input id="pin" name="pin" type="password" inputmode="numeric" minlength="6" placeholder="Choisis un PIN (6 chiffres min.)" autocomplete="new-password" required>
    </div>

    <div class="field">
      <label for="pinConfirm">Confirmer le PIN</label>
      <input id="pinConfirm" name="pinConfirm" type="password" inputmode="numeric" minlength="6" placeholder="Confirme ton PIN" autocomplete="new-password" required>
    </div>

    <p id="formError" style="color:#ef4444; font-size:13px; display:none; margin:-6px 0 14px;"></p>

    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Créer mon compte</button>

    <p class="auth-footer">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </p>
  </form>
</main>

<script type="module">
  import { auth, db, usernameToEmail, createUserWithEmailAndPassword, doc, setDoc, serverTimestamp } from "./js/firebase-init.js";

  const form = document.getElementById('registerForm');
  const errorEl = document.getElementById('formError');
  const submitBtn = document.getElementById('submitBtn');

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const pin = document.getElementById('pin').value;
    const pinConfirm = document.getElementById('pinConfirm').value;

    if (username.length < 3) return showError("Le nom d'utilisateur doit faire au moins 3 caractères.");
    if (pin.length < 6) return showError("Le PIN doit faire au moins 6 chiffres.");
    if (pin !== pinConfirm) return showError("Les deux PIN ne correspondent pas.");

    submitBtn.disabled = true;
    submitBtn.textContent = "Création...";

    try {
      const email = usernameToEmail(username);
      const cred = await createUserWithEmailAndPassword(auth, email, pin);
      await setDoc(doc(db, 'users', cred.user.uid), {
        username,
        role: 'Membre',
        organisation: '—',
        banned: false,
        createdAt: serverTimestamp(),
      });
      window.location.href = 'dashboard.html';
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = "Créer mon compte";
      if (err.code === 'auth/email-already-in-use') {
        showError("Ce nom d'utilisateur est déjà pris.");
      } else if (err.code === 'auth/weak-password') {
        showError("PIN trop faible (6 caractères minimum).");
      } else {
        showError("Erreur : " + err.message);
      }
    }
  });
</script>
</body>
</html>
