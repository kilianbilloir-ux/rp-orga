    <main class="page">

<script type="module">
  import { requireAuth } from "./js/auth-guard.js";
  import { db, collection, onSnapshot } from "./js/firebase-init.js";

  const CATEGORY_ORDER = ["Ventes", "Braquage", "Actions", "Four"];
  const CATEGORY_LABELS = {
    Ventes: "Ventes",
    Braquage: "Braquages",
    Actions: "Actions",
    Four: "Ventes du Four",
  };

  // Renvoie le dimanche 19h le plus récent (même logique que la Comptabilité).
  function getWeekStart(now = new Date()) {
    const d = new Date(now);
    const candidate = new Date(d);
    candidate.setDate(d.getDate() - d.getDay());
    candidate.setHours(19, 0, 0, 0);
    if (candidate > d) candidate.setDate(candidate.getDate() - 7);
    return candidate;
  }

  function money(n) {
    return '$' + Number(n || 0).toLocaleString('fr-FR');
  }

  requireAuth().then(() => {
    const container = document.getElementById('recapSections');

    onSnapshot(collection(db, 'actions'), (snap) => {
      const weekStart = getWeekStart().getTime();
      const rows = snap.docs
        .map(d => d.data())
        .filter(a => {
          const ts = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
          return ts >= weekStart;
        });

      if (rows.length === 0) {
        container.innerHTML = '<div class="card"><p style="color:var(--text-2); margin:0;">Rien d\'enregistré depuis dimanche 19h pour l\'instant.</p></div>';
        return;
      }

      // Regroupe par categorie puis par item.
      const grouped = {};
      rows.forEach(a => {
        const cat = a.category || 'Autre';
        const item = a.item || '—';
        grouped[cat] = grouped[cat] || {};
        grouped[cat][item] = grouped[cat][item] || { count: 0, qty: 0, amount: 0 };
        grouped[cat][item].count += 1;
        grouped[cat][item].qty += Number(a.quantity || 1);
        grouped[cat][item].amount += Number(a.amount || 0);
      });

      const orderedCats = [
        ...CATEGORY_ORDER.filter(c => grouped[c]),
        ...Object.keys(grouped).filter(c => !CATEGORY_ORDER.includes(c)),
      ];

      container.innerHTML = orderedCats.map(cat => {
        const items = grouped[cat];
        const itemNames = Object.keys(items).sort((a, b) => items[b].count - items[a].count);
        const totalCount = itemNames.reduce((s, i) => s + items[i].count, 0);
        const totalAmount = itemNames.reduce((s, i) => s + items[i].amount, 0);

        const rowsHtml = itemNames.map(item => {
          const it = items[item];
          return `<tr>
            <td>${item}</td>
            <td>${it.count}</td>
            <td>${it.qty}</td>
            <td>${money(it.amount)}</td>
          </tr>`;
        }).join('');

        return `
          <div class="card" style="margin-bottom:20px;">
            <h3>${CATEGORY_LABELS[cat] || cat}</h3>
            <p class="card-sub">${totalCount} au total — ${money(totalAmount)}</p>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Détail</th><th>Nombre</th><th>Quantité</th><th>Argent rapporté</th></tr></thead>
                <tbody>${rowsHtml}</tbody>
              </table>
            </div>
          </div>
        `;
      }).join('');
    });
  });
</script>
