    <main class="page">
      <div class="page-header">
        <h1>Membres</h1>
        <p>Liste des membres de la communauté.</p>
      </div>

      <input type="text" class="search-input" id="memberSearch" placeholder="Rechercher un membre...">

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Nom d'utilisateur</th><th>Rôle</th><th>Organisation</th><th>Statut</th></tr>
            </thead>
            <tbody id="membersTable">
              <tr><td colspan="4" style="color:var(--text-2);">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

</div>


<script type="module">
  import { requireAuth, currentUser } from "./js/auth-guard.js";
  import { db, collection, doc, updateDoc, onSnapshot } from "./js/firebase-init.js";

  // Rôles que le Lead (ou l'Admin) peut attribuer depuis cette page.
  // Le Lead ne peut jamais modifier le rôle d'un Admin, ni promouvoir quelqu'un Admin.
  const ASSIGNABLE_ROLES = ['Recrue', 'Membre', 'Gérant Four', 'Co-Lead'];

  requireAuth().then(() => {
    const role = (currentUser.role || '').toLowerCase();
    const canEditRoles = role === 'admin' || role === 'lead';

    const tbody = document.getElementById('membersTable');
    const searchInput = document.getElementById('memberSearch');
    let allMembers = [];

    function roleSelectHtml(m) {
      const isTargetAdmin = (m.role || '').toLowerCase() === 'admin';
      if (!canEditRoles || isTargetAdmin || m.uid === currentUser.uid) {
        return (m.role && m.role.toLowerCase() !== 'membre')
          ? `<span class="badge staff">${m.role}</span>`
          : (m.role || 'Membre');
      }
      const options = ASSIGNABLE_ROLES.map(r =>
        `<option value="${r}" ${m.role === r ? 'selected' : ''}>${r}</option>`
      ).join('');
      return `<select class="field-select role-select" data-uid="${m.uid}" style="padding:6px 10px; font-size:13px;">${options}</select>`;
    }

    function render() {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = allMembers.filter(m => m.username.toLowerCase().includes(q));
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-2);">Aucun membre trouvé.</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(m => {
        const initials = m.username.slice(0, 2).toUpperCase();
        const statusHtml = m.banned
          ? `<span class="badge" style="background:rgba(239,68,68,0.12); color:var(--red);">Banni</span>`
          : `<span class="badge">Actif</span>`;
        return `<tr>
          <td><div class="user-cell"><span class="avatar">${initials}</span> ${m.username}</div></td>
          <td>${roleSelectHtml(m)}</td>
          <td>${m.organisation || '—'}</td>
          <td>${statusHtml}</td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.role-select').forEach(sel => {
        sel.addEventListener('change', async () => {
          const uid = sel.dataset.uid;
          const newRole = sel.value;
          try {
            await updateDoc(doc(db, 'users', uid), { role: newRole });
          } catch (err) {
            alert("Impossible de changer le rôle : " + err.message);
          }
        });
      });
    }

    onSnapshot(collection(db, 'users'), (snap) => {
      allMembers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
      render();
    });

    searchInput.addEventListener('input', render);
  });
</script>
<script src="js/mobile-nav.js"></script>
