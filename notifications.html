<script type="module">
  import { requireAuth, currentUser } from "./js/auth-guard.js";
  import { db, collection, query, where, onSnapshot } from "./js/firebase-init.js";

  const WARN_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
  const OK_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>';

  // Délai (en heures) avant de pouvoir refaire la même action.
  const COOLDOWN_HOURS = {
    "Go fast": 24,
    "ATM": 4,
    "Supérette": 3,
  };

  requireAuth().then(() => {
    const list = document.getElementById('notifList');
    let bans = [];
    let cooldownsReady = [];

    function render() {
      const items = [...bans, ...cooldownsReady].sort((a, b) => b.ts - a.ts);
      if (items.length === 0) {
        list.innerHTML = '<div class="notif-item"><div class="notif-body"><div class="title">Aucune notification pour l\'instant.</div></div></div>';
        return;
      }
      list.innerHTML = items.map(n => `
        <div class="notif-item">
          <div class="notif-icon ${n.type === 'ban' ? 'warn' : 'ok'}">${n.type === 'ban' ? WARN_ICON : OK_ICON}</div>
          <div class="notif-body">
            <div class="title">${n.type === 'ban' ? 'Bannissement' : 'Tu peux recommencer !'}</div>
            <p>${n.message}</p>
            <span class="time">${n.date}</span>
          </div>
        </div>
      `).join('');
    }

    function fmt(ts) { return ts ? new Date(ts).toLocaleString('fr-FR') : '—'; }

    onSnapshot(query(collection(db, 'notifications'), where('type', '==', 'ban')), (snap) => {
      bans = snap.docs.map(d => {
        const n = d.data();
        const ts = n.createdAt?.toDate ? n.createdAt.toDate().getTime() : 0;
        return { type: 'ban', message: n.message, ts, date: fmt(ts) };
      });
      render();
    });

    // Notification "tu peux refaire ça" : calculée en direct, elle n'apparaît
    // qu'une fois le délai (24h / 4h / 3h) réellement écoulé depuis l'action.
    onSnapshot(query(collection(db, 'actions'), where('uid', '==', currentUser.uid)), (snap) => {
      const now = Date.now();
      cooldownsReady = snap.docs
        .map(d => d.data())
        .filter(a => COOLDOWN_HOURS[a.item])
        .map(a => {
          const doneAt = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
          const cooldown = COOLDOWN_HOURS[a.item];
          const availableAt = doneAt + cooldown * 3600 * 1000;
          return { item: a.item, doneAt, availableAt };
        })
        .filter(a => now >= a.availableAt)
        // Ne garde que la dernière action par item (pas besoin de répéter le message).
        .reduce((acc, a) => {
          if (!acc[a.item] || a.doneAt > acc[a.item].doneAt) acc[a.item] = a;
          return acc;
        }, {});

      cooldownsReady = Object.values(cooldownsReady).map(a => ({
        type: 'cooldown',
        message: `Tu peux maintenant refaire un(e) ${a.item} !`,
        ts: a.availableAt,
        date: fmt(a.availableAt),
      }));
      render();
    });

    // Recalcule toutes les minutes pour faire apparaître les notifications
    // dès que leur délai se termine, sans avoir à recharger la page.
    setInterval(render, 60 * 1000);
  });
</script>
