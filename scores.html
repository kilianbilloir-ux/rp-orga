<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA RP ORG — Tableau des scores</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <aside class="sidebar">
    <div class="brand"><span><span class="brand-mark">G</span> GTA RP ORG</span><button class="sidebar-close" id="sidebarClose" aria-label="Fermer le menu"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M6 18L18 6"/></svg></button></div>
    <a href="dashboard.html" class="side-link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      Tableau de bord
    </a>
    <a href="activites.html" class="side-link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      Activités
    </a>
    <a href="four.html" class="side-link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V10l7-7 7 7v11"/><path d="M9 21v-6h6v6"/></svg>
      Four
    </a>
    <a href="membres.html" class="side-link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Membres
    </a>
    <a href="scores.html" class="side-link active">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-6"/></svg>
      Tableau des scores
    </a>
    <a href="comptabilite.html" class="side-link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Comptabilité
    </a>
    <a href="admin.html" class="side-link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin
    </a>

    <a href="notifications.html" class="side-link">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Notifications
    </a>
    <div class="sidebar-footer">
      <button data-logout class="btn btn-danger btn-block btn-sm">Déconnexion</button>
    </div>
  </aside>

  <div class="content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle" aria-label="Ouvrir le menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <span class="brand"><span class="brand-mark">G</span> GTA RP ORG</span>
      </div>
      <a href="notifications.html" class="bell" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="dot"></span>
      </a>
    </header>

    <main class="page">
      <div class="page-header">
        <h1>Tableau des scores</h1>
        <p>Classement des membres par activités réalisées et argent rapporté (tout confondu, sur le long terme).</p>
      </div>

      <div class="card">
        <div id="scoresList">
          <p style="color:var(--text-2);">Chargement...</p>
        </div>
      </div>
    </main>
  </div>
</div>


<script type="module">
  import { requireAuth } from "./js/auth-guard.js";
  import { db, collection, onSnapshot } from "./js/firebase-init.js";

  requireAuth().then(() => {
    const container = document.getElementById('scoresList');
    let users = [];
    let actions = [];

    function render() {
      if (users.length === 0) {
        container.innerHTML = '<p style="color:var(--text-2);">Aucun membre pour l\'instant.</p>';
        return;
      }

      const stats = users.map(u => {
        const mine = actions.filter(a => a.username === u.username);
        const count = mine.length;
        const money = mine.reduce((s, a) => s + Number(a.amount || 0), 0);
        return { username: u.username, count, money };
      });

      const maxCount = Math.max(1, ...stats.map(s => s.count));
      const maxMoney = Math.max(1, ...stats.map(s => s.money));

      stats.sort((a, b) => b.money - a.money);

      container.innerHTML = stats.map((s, i) => {
        const countPct = Math.round((s.count / maxCount) * 100);
        const moneyPct = Math.round((s.money / maxMoney) * 100);
        const initials = s.username.slice(0, 2).toUpperCase();
        return `
          <div style="padding:16px 4px; border-bottom:1px solid var(--border);">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
              <span style="color:var(--text-2); font-family:var(--font-display); font-weight:700; width:22px;">#${i + 1}</span>
              <span class="avatar">${initials}</span>
              <span style="color:var(--text-0); font-weight:600;">${s.username}</span>
            </div>

            <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--text-2); margin-bottom:4px;">
              <span>Activités</span><span>${s.count} — ${countPct}%</span>
            </div>
            <div style="background:var(--bg-1); border-radius:999px; height:8px; overflow:hidden; margin-bottom:12px;">
              <div style="width:${countPct}%; height:100%; background:var(--blue);"></div>
            </div>

            <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--text-2); margin-bottom:4px;">
              <span>Argent rapporté</span><span>$${s.money.toLocaleString('fr-FR')} — ${moneyPct}%</span>
            </div>
            <div style="background:var(--bg-1); border-radius:999px; height:8px; overflow:hidden;">
              <div style="width:${moneyPct}%; height:100%; background:var(--green);"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    onSnapshot(collection(db, 'users'), (snap) => {
      users = snap.docs.map(d => d.data());
      render();
    });
    onSnapshot(collection(db, 'actions'), (snap) => {
      actions = snap.docs.map(d => d.data());
      render();
    });
  });
</script>
<script src="js/mobile-nav.js"></script>
</body>
</html>
